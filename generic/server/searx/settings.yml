use_default_settings:
  engines:
    remove:
      - google
      - google images
      - google videos
      - google play movies
      - google news
      - google scholar
      - google play apps
      - apple maps
      - apple app store

ui:
  theme_args:
    simple_style: black

general:
  enable_metrics: true
  open_metrics: "@SEARX_METRICS_PASSWORD@"

server:
  secret_key: "@SEARX_SECRET_KEY@"
  image_proxy: true

search:
  safe_search: 0
  autocomplete_min: 2
  autocomplete: duckduckgo
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120

redis:
  url: "@SEARX_REDIS_URL@"

engines:
  - name: openlibrary
    disabled: false
  - name: annas archive
    disabled: false
  - name: reddit
    disabled: false
  - name: steam
    disabled: false
  - name: nixos wiki
    disabled: false
  - name: jellyfin
    disabled: false
    engine: meilisearch
    weight: 2
    shortcut: jel
    base_url: https://meilisearch.lc.brotherwolf.ca
    index: jellyfin
    auth_key: "@MEILISEARCH_AUTH_KEY@"
    tokens: [ '@SEARX_DANIEL_TOKEN@' ]

plugins:
  searx.plugins.calculator.SXNGPlugin:
    active: true
  searx.plugins.infinite_scroll.SXNGPlugin:
    active: true
  searx.plugins.hash_plugin.SXNGPlugin:
    active: true
  searx.plugins.self_info.SXNGPlugin:
    active: true
  searx.plugins.tracker_url_remover.SXNGPlugin:
    active: true
  searx.plugins.unit_converter.SXNGPlugin:
    active: true
  searx.plugins.ahmia_filter.SXNGPlugin:
    active: true
  searx.plugins.hostnames.SXNGPlugin:
    active: true
  searx.plugins.oa_doi_rewrite.SXNGPlugin:
    active: true
  searx.plugins.tor_check.SXNGPlugin:
    active: true
